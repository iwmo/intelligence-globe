<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#0a0f1a"/>
  <!-- Globe body -->
  <circle cx="16" cy="16" r="11" fill="#0d1b2e" stroke="#00d4ff" stroke-width="1.2"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="11" ry="8" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
  <!-- Vertical meridian -->
  <ellipse cx="16" cy="16" rx="4" ry="11" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.5"/>
  <!-- Equator -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="#00d4ff" stroke-width="0.6" opacity="0.5"/>
  <!-- Orbit ring -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" transform="rotate(-30 16 16)"/>
  <!-- Satellite dot on orbit -->
  <circle cx="27.5" cy="13.5" r="1.5" fill="#00d4ff" opacity="0.9"/>
  <!-- Globe clip -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
</svg>
